name: digital_khata
description: "A new Flutter project."

publish_to: "none" 

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  nepali_utils: ^3.0.3
  cloud_firestore: ^4.9.0
  firebase_core: ^2.32.0
  provider: ^6.1.1
  flutter_localizations:
    sdk: flutter
  firebase_auth: ^4.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Kalimati
      fonts:
        - asset: assets/fonts/Kalimati.otf
