name: digital_khata
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  nepali_utils: ^3.0.3
  cloud_firestore: ^6.0.1
  firebase_core: ^4.1.0
  provider: ^6.1.1
  flutter_localizations:
    sdk: flutter
  firebase_auth: ^6.0.2
  image_picker: ^1.2.0
  firebase_storage: ^13.0.1
  url_launcher: ^6.3.0
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Kalimati
      fonts:
        - asset: assets/fonts/Kalimati.otf
